<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScaleX Insights</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    
    <div class="box n1">
      <h2>ScaleX</h2>
    </div>
    
    <div class="box n2">
      <a href="#">Home</a>
      <a href="#">About Us</a>
      <a href="#">Blogs</a>
      <a href="#">Contact Us</a>
    </div>
    
    <div class="box n3">
      <button class="btnstart">Get Started</button>
    </div>

    <div class="box h1">
      <h1>Insights & Blogs</h1>
    </div>

    <div class="box f1">
      <button class="filterbtn active">All</button>
      <button class="filterbtn">Tech</button>
      <button class="filterbtn">SaaS</button>
      <button class="filterbtn">Marketing</button>
    </div>

    <div class="box c1">
      <img src="./image 1.png" alt="Tech">
      <div class="cardinfo">
        <span class="badge">Tech</span>
        <h3>The Ultimate Guide To SaaS Marketing</h3>
        <p>May 23, 2025</p>
      </div>
    </div>

    <div class="box c2">
      <img src="./image 2.png" alt="SaaS">
      <div class="cardinfo">
        <span class="badge">SaaS</span>
        <h3>5 Key Trends In SaaS Growth For 2025</h3>
        <p>May 23, 2025</p>
      </div>
    </div>

    <div class="box c3">
      <img src="./image 3.png" alt="Marketing">
      <div class="cardinfo">
        <span class="badge">Marketing</span>
        <h3>How Data-Driven Strategies Are Important</h3>
        <p>May 23, 2025</p>
      </div>
    </div>

  </div>

</body>
</html>
