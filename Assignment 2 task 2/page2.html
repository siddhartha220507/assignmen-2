<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insect</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    <img src="./image 4.png" alt="Center Insect" class="center-insect">
    <div class="box b1"><a href="">INSECT</a></div>
    
    <div class="box b2">
      <div class="search-box">
        <i class="ri-search-line"></i>
        <input type="text" placeholder="Search...">
      </div>
    </div>
    
    <div class="box b3">
        <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a></nav>
    </div>

    <div class="box b4">Classification</div>
    
    <div class="box b5">
        <h4>class:</h4>
        <h5>Insecta</h5>
        <h4>order:</h4>
        <h5>Coleoptera</h5>
        <h4>family:</h4>
        <h5>Cerambycidae</h5>
        <h4>genus:</h4>
        <h5>Cryptolestes</h5>
        <h4>species:</h4>
        <h5>Cryptolestes pusillus</h5>
    </div>

    <div class="box b6">
        <h1>Pachyteria</h1>
        <h1>equestris</h1>
    </div>
    
    <div class="box b7"><img src="./image 3.jpg" alt="details"></div>
    
    <div class="box b8">
        <h1 class="price">$5.99</h1>
        <div class="toggle-container">
            <label class="toggle-switch">
                <input type="checkbox">
                <span class="slider"></span>
                <span class="toggle-label">View detailed antennae</span>
            </label>
            <label class="toggle-switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
                <span class="toggle-label">View underside</span>
            </label>
        </div>
        <button class="add-btn">Add to collection</button>
    </div>
  </div>

</body>
</html>
